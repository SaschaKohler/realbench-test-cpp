# RealBench Profiling — GitHub Action
#
# This workflow automatically profiles the C++ application using RealBench
# on every push and pull request, posting results as PR comments.

name: RealBench Profiling

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  profile:
    name: Profile & Analyse
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # needed to post PR comments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install CMake and build tools
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      # Build the C++ project with debug symbols for profiling
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build --parallel

      # Upload binary to RealBench for profiling
      - name: Upload binary to RealBench
        id: realbench
        env:
          REALBENCH_API_KEY: ${{ secrets.REALBENCH_API_KEY }}
          REALBENCH_PROJECT_ID: ${{ secrets.REALBENCH_PROJECT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Validate required secrets
          if [ -z "$REALBENCH_API_KEY" ]; then
            echo "❌ REALBENCH_API_KEY secret is not set"
            echo "Please set up the required secrets in your repository:"
            echo "- REALBENCH_API_KEY: Your RealBench API key (starts with rbk_)"
            echo "- REALBENCH_PROJECT_ID: Your RealBench project UUID"
            exit 1
          fi
          
          if [ -z "$REALBENCH_PROJECT_ID" ]; then
            echo "❌ REALBENCH_PROJECT_ID secret is not set"
            echo "Please set up the required secrets in your repository:"
            echo "- REALBENCH_API_KEY: Your RealBench API key (starts with rbk_)"
            echo "- REALBENCH_PROJECT_ID: Your RealBench project UUID"
            exit 1
          fi

          # Detect PR number (empty for push events)
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Path to the compiled binary
          BINARY_PATH="build/bin/realbench-test"

          # Upload to RealBench API
          echo "Uploading binary to RealBench API..."
          echo "Binary path: ${BINARY_PATH}"
          echo "API URL: ${REALBENCH_API_URL:-https://realbench-api.fly.dev/api/v1/profile}"
          echo "Project ID: ${REALBENCH_PROJECT_ID}"
          echo "Commit SHA: ${{ github.sha }}"
          
          # Check if binary exists
          if [ ! -f "${BINARY_PATH}" ]; then
            echo "❌ Binary not found at ${BINARY_PATH}"
            echo "Available files in build directory:"
            ls -la build/ || echo "Build directory not found"
            exit 1
          fi
          
          echo "Binary file size: $(wc -c < "${BINARY_PATH}") bytes"
          
          RESPONSE=$(curl -sf --show-error \
            -F "binary=@${BINARY_PATH}" \
            -F "projectId=${REALBENCH_PROJECT_ID}" \
            -F "commitSha=${{ github.sha }}" \
            -F "branch=${{ github.head_ref || github.ref_name }}" \
            -F "buildType=release" \
            -F "githubRepo=${{ github.repository }}" \
            ${PR_NUMBER:+-F "githubPrNumber=${PR_NUMBER}"} \
            ${PR_NUMBER:+-F "githubToken=${GITHUB_TOKEN}"} \
            -H "Authorization: Bearer ${REALBENCH_API_KEY}" \
            "${REALBENCH_API_URL:-https://realbench-api.fly.dev/api/v1/profile}")
          
          CURL_EXIT_CODE=$?
          echo "curl exit code: ${CURL_EXIT_CODE}"
          echo "Response body: ${RESPONSE}"
          
          if [ ${CURL_EXIT_CODE} -ne 0 ]; then
            echo "❌ Failed to upload binary to RealBench API (curl exit code: ${CURL_EXIT_CODE})"
            exit ${CURL_EXIT_CODE}
          fi

          RUN_ID=$(echo "${RESPONSE}" | jq -r '.runId')
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "✅ RealBench run enqueued: ${RUN_ID}"

      # Wait for profiling result (optional - remove if you don't want blocking CI)
      - name: Wait for profiling result
        if: steps.realbench.outputs.run_id != ''
        env:
          REALBENCH_API_KEY: ${{ secrets.REALBENCH_API_KEY }}
        run: |
          RUN_ID="${{ steps.realbench.outputs.run_id }}"
          echo "Polling run ${RUN_ID}..."

          for i in $(seq 1 30); do
            STATUS=$(curl -sf \
              -H "Authorization: Bearer ${REALBENCH_API_KEY}" \
              "${REALBENCH_API_URL:-https://realbench-api.fly.dev}/api/v1/runs/${RUN_ID}" \
              | jq -r '.run.status')

            echo "  attempt ${i}: status=${STATUS}"

            if [ "${STATUS}" = "done" ]; then
              echo "✅ Profiling complete."
              exit 0
            elif [ "${STATUS}" = "failed" ]; then
              echo "❌ Profiling failed."
              exit 1
            fi

            sleep 10
          done

          echo "⏳ Timed out waiting for profiling result (run still in progress)."
